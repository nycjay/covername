<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none">
  <!-- Background -->
  <rect width="1280" height="640" fill="#0f172a"/>
  
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1280" height="640" fill="url(#grid)"/>
  
  <!-- Logo (centered, larger) -->
  <g transform="translate(540, 140) scale(2.5)">
    <rect x="24" y="12" width="80" height="104" rx="8" fill="#f8fafc" stroke="#0d9488" stroke-width="4"/>
    <path d="M76 12 V40 H104" fill="none" stroke="#0d9488" stroke-width="4" stroke-linejoin="round"/>
    <path d="M76 12 L104 12 L104 12 L76 40 Z" fill="#e2e8f0"/>
    <rect x="40" y="52" width="48" height="5" rx="2.5" fill="#cbd5e1"/>
    <rect x="40" y="64" width="40" height="5" rx="2.5" fill="#cbd5e1"/>
    <rect x="36" y="78" width="56" height="12" rx="4" fill="#0d9488"/>
    <rect x="42" y="82" width="16" height="4" rx="2" fill="#ffffff" opacity="0.9"/>
    <rect x="62" y="82" width="10" height="4" rx="2" fill="#ffffff" opacity="0.6"/>
    <rect x="40" y="98" width="44" height="5" rx="2.5" fill="#cbd5e1"/>
  </g>
  
  <!-- Title -->
  <text x="640" y="480" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="56" font-weight="700" fill="#f8fafc" text-anchor="middle">Covername</text>
  
  <!-- Tagline -->
  <text x="640" y="530" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="24" fill="#94a3b8" text-anchor="middle">Local-first document anonymization</text>
  
  <!-- Accent line -->
  <rect x="560" y="550" width="160" height="3" rx="1.5" fill="#0d9488" opacity="0.6"/>
</svg>
